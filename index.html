<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Atelier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f8efe7;
            --bg-2: #f3e8e3;
            --bg-3: #e9d9cf;
            --surface: rgba(255, 255, 255, 0.78);
            --surface-strong: rgba(255, 255, 255, 0.9);
            --line: rgba(123, 92, 74, 0.18);
            --text: #3f2f2a;
            --text-soft: #6d5b53;
            --accent: #b46d5d;
            --accent-hover: #9a5b4e;
            --ok: #2f7a62;
            --warn: #cb8f45;
            --error: #b84949;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow: 0 14px 40px rgba(68, 37, 26, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", sans-serif;
            color: var(--text);
            min-height: 100vh;
            background:
                radial-gradient(1200px 500px at 18% -5%, rgba(230, 191, 164, 0.32), transparent 70%),
                radial-gradient(900px 540px at 92% 10%, rgba(216, 171, 170, 0.3), transparent 70%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 20px;
            animation: rise 560ms ease-out both;
        }

        .hero h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(2.2rem, 4vw, 3.2rem);
            letter-spacing: 0.02em;
            color: #4f342f;
        }

        .hero p {
            margin-top: 6px;
            color: var(--text-soft);
            font-size: 0.96rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .composer {
            padding: 18px;
            margin-bottom: 18px;
            animation: rise 720ms ease-out both;
        }

        .composer-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .composer-top h2 {
            font-size: 1.05rem;
            color: #543d36;
        }

        .count-badge {
            background: rgba(180, 109, 93, 0.13);
            color: #7b483d;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
            border: 1px solid rgba(180, 109, 93, 0.22);
        }

        .composer-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn-top {
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(93, 73, 64, 0.11);
            color: #5c453d;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(122, 92, 78, 0.22);
        }

        .btn-top:hover { background: rgba(93, 73, 64, 0.18); }

        .message-input {
            width: 100%;
            min-height: 112px;
            border: 1px solid rgba(122, 92, 78, 0.28);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 15px;
            font-size: 15px;
            color: var(--text);
            resize: vertical;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .message-input:focus,
        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: none;
            border-color: rgba(180, 109, 93, 0.6);
            box-shadow: 0 0 0 4px rgba(180, 109, 93, 0.14);
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .random-panel {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(122, 92, 78, 0.2);
            background: rgba(255, 255, 255, 0.72);
            display: grid;
            gap: 10px;
        }

        .random-controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .pool-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .pool-meta {
            font-size: 0.82rem;
            color: #7a5c52;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(180, 109, 93, 0.1);
            border: 1px solid rgba(180, 109, 93, 0.18);
        }

        button {
            border: none;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-main {
            padding: 11px 22px;
            border-radius: 12px;
            background: linear-gradient(130deg, #c37f6a, #aa6657);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 10px 24px rgba(153, 88, 71, 0.22);
        }

        .btn-main:hover { transform: translateY(-1px); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-soft,
        .btn-danger,
        .btn-add {
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 0.86rem;
            font-weight: 500;
        }

        .btn-soft {
            background: rgba(118, 93, 82, 0.1);
            color: #5d4840;
        }

        .btn-soft:hover { background: rgba(118, 93, 82, 0.16); }

        .btn-danger {
            background: rgba(184, 73, 73, 0.12);
            color: #9f3f3f;
        }

        .btn-danger:hover { background: rgba(184, 73, 73, 0.18); }

        .btn-add {
            background: rgba(47, 122, 98, 0.12);
            color: #2f7a62;
        }

        .btn-add:hover { background: rgba(47, 122, 98, 0.19); }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 16px;
        }

        .test-card {
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: 0 12px 34px rgba(72, 39, 30, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 460px;
            animation: rise 700ms ease-out both;
        }

        .card-header {
            padding: 13px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(120deg, rgba(247, 232, 220, 0.9), rgba(243, 218, 209, 0.72));
            border-bottom: 1px solid var(--line);
            gap: 8px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .card-title h3 {
            font-size: 1rem;
            color: #5d4038;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .card-status {
            font-size: 0.75rem;
            border-radius: 999px;
            padding: 4px 9px;
            color: #fff;
            background: #8b7d76;
            flex-shrink: 0;
        }

        .card-status.ready { background: var(--ok); }
        .card-status.loading { background: var(--warn); }
        .card-status.error { background: var(--error); }

        .icon-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(184, 73, 73, 0.12);
            color: #8f3f3f;
            font-size: 15px;
            line-height: 1;
        }

        .icon-btn:hover { background: rgba(184, 73, 73, 0.2); }

        .icon-btn.copy {
            background: rgba(47, 122, 98, 0.14);
            color: #2f7a62;
            margin-right: 4px;
        }

        .icon-btn.copy:hover { background: rgba(47, 122, 98, 0.24); }

        .card-body {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .config-section {
            border: 1px solid rgba(122, 92, 78, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.72);
            overflow: hidden;
        }

        .config-toggle {
            width: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #6a4f47;
            background: rgba(245, 237, 230, 0.9);
            font-weight: 600;
            font-size: 0.88rem;
        }

        .config-toggle svg {
            transition: transform 0.24s ease;
        }

        .config-toggle.collapsed svg {
            transform: rotate(-90deg);
        }

        .config-form {
            padding: 12px;
            display: grid;
            gap: 10px;
        }

        .config-form.collapsed { display: none; }

        .field {
            display: grid;
            gap: 5px;
        }

        .field label {
            font-size: 0.8rem;
            color: var(--text-soft);
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            border: 1px solid rgba(122, 92, 78, 0.24);
            border-radius: 9px;
            padding: 9px 10px;
            background: #fff;
            color: var(--text);
            font-size: 13px;
        }

        .field textarea { min-height: 74px; resize: vertical; }

        .row-2 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 8px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .model-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: end;
        }

        .model-custom.hidden { display: none; }

        .saved-indicator {
            font-size: 0.75rem;
            color: var(--ok);
            margin-top: -1px;
        }

        .save-line {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .save-tip {
            font-size: 0.77rem;
            color: var(--ok);
            min-height: 17px;
        }

        .history-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(59, 35, 28, 0.28);
            z-index: 90;
            display: none;
        }

        .history-backdrop.show { display: block; }

        .history-drawer {
            position: fixed;
            top: 16px;
            right: 16px;
            width: min(520px, calc(100vw - 32px));
            max-height: calc(100vh - 32px);
            overflow: hidden;
            z-index: 100;
            border-radius: 16px;
            border: 1px solid rgba(123, 92, 74, 0.22);
            background: rgba(255, 251, 248, 0.98);
            box-shadow: 0 20px 50px rgba(66, 39, 31, 0.24);
            transform: translateY(-10px);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .history-drawer.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .history-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(123, 92, 74, 0.18);
            background: linear-gradient(120deg, rgba(248, 236, 225, 0.95), rgba(244, 224, 215, 0.88));
        }

        .history-head h3 {
            font-size: 0.95rem;
            color: #5a4037;
        }

        .history-body {
            padding: 12px;
            display: grid;
            gap: 12px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .history-block {
            border: 1px solid rgba(123, 92, 74, 0.2);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.9);
        }

        .history-title {
            padding: 8px 10px;
            font-size: 0.82rem;
            color: #6a4f47;
            border-bottom: 1px solid rgba(123, 92, 74, 0.14);
            background: rgba(247, 238, 230, 0.75);
        }

        .history-list {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 220px;
            overflow-y: auto;
        }

        .history-item {
            border-bottom: 1px dashed rgba(123, 92, 74, 0.17);
            padding: 8px 10px;
            font-size: 0.8rem;
            line-height: 1.45;
            color: #5a443b;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .history-item:last-child { border-bottom: none; }

        .history-time {
            display: block;
            font-size: 0.72rem;
            color: #8b7166;
            margin-bottom: 4px;
        }

        .history-empty {
            padding: 12px;
            color: #8a7368;
            font-size: 0.8rem;
        }

        .result-section {
            border: 1px solid rgba(122, 92, 78, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            padding: 12px;
            min-height: 190px;
            max-height: 360px;
            overflow-y: auto;
        }

        .result-placeholder {
            color: #8b766c;
            text-align: center;
            font-size: 0.9rem;
            padding-top: 42px;
            line-height: 1.6;
        }

        .result-meta {
            margin-bottom: 8px;
            color: #8a665b;
            font-size: 0.78rem;
        }

        .result-content {
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .result-content.error { color: #9f3f3f; }

        .rating-section {
            border: 1px solid rgba(122, 92, 78, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.84);
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .rating-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .rating-title {
            font-size: 0.84rem;
            color: #6a4f47;
            font-weight: 600;
        }

        .rating-stats {
            font-size: 0.78rem;
            color: #8b6b5f;
        }

        .rating-scores {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
        }

        .score-btn {
            border: 1px solid rgba(122, 92, 78, 0.22);
            border-radius: 8px;
            background: rgba(244, 236, 230, 0.78);
            color: #6d5047;
            font-size: 0.76rem;
            padding: 6px 0;
            font-weight: 600;
        }

        .score-btn:hover {
            background: rgba(235, 215, 203, 0.8);
        }

        .score-btn.active {
            border-color: rgba(180, 109, 93, 0.56);
            background: linear-gradient(120deg, rgba(195, 127, 106, 0.9), rgba(170, 102, 87, 0.9));
            color: #fff;
        }

        .rating-tip {
            font-size: 0.76rem;
            color: #8b7166;
        }

        .error-details {
            margin-top: 10px;
            border: 1px solid rgba(184, 73, 73, 0.28);
            background: rgba(255, 247, 247, 0.9);
            border-radius: 8px;
            padding: 8px;
            font-size: 0.77rem;
        }

        .error-details summary { cursor: pointer; font-weight: 600; }

        .error-details pre {
            margin-top: 8px;
            background: #fff;
            border-radius: 6px;
            padding: 8px;
            overflow-x: auto;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 140px;
        }

        .spinner {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid rgba(180, 109, 93, 0.18);
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 820px) {
            body { padding: 14px; }
            .row-2 { grid-template-columns: 1fr; }
            .row-3 { grid-template-columns: 1fr; }
            .model-row { grid-template-columns: 1fr; }
            .card-header { align-items: flex-start; }
            .action-row { gap: 8px; }
            .random-controls { grid-template-columns: 1fr; }
            .rating-scores { grid-template-columns: repeat(5, minmax(0, 1fr)); }
            .history-drawer {
                top: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                max-height: calc(100vh - 20px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Prompt Atelier</h1>
            <p>支持 OpenAI / DeepSeek 双供应商并行对比，可按卡片切换供应商、模型与参数，边调试边对照。</p>
        </div>

        <section class="panel composer">
            <div class="composer-top">
                <h2>写下你的 Prompt</h2>
                <div class="composer-tools">
                    <button class="btn-top" onclick="togglePromptHistory(true)">价格历史</button>
                    <span id="cardCount" class="count-badge">当前 6 个模型</span>
                </div>
            </div>

            <textarea id="userMessage" class="message-input" placeholder="在这里输入你的消息，点击发送后会并行请求所有卡片..."></textarea>

            <div class="action-row">
                <button id="sendBtn" class="btn-main" onclick="sendToAll()">发送到全部模型</button>
                <button class="btn-add" onclick="addModelCard()">+ 添加模型卡片</button>
                <button class="btn-soft" onclick="loadAnnotationTemplate()">批注测试模板</button>
                <button class="btn-soft" onclick="loadRandomAnnotationTest()">随机批注测试</button>
                <button class="btn-soft" onclick="exportRatingsToExcel()">导出评分 Excel</button>
                <button class="btn-soft" onclick="clearAll()">清空结果</button>
                <button class="btn-danger" onclick="clearAllStorage()">清除本地配置</button>
            </div>

            <div class="random-panel">
                <div class="random-controls">
                    <div class="field">
                        <label>心情分类</label>
                        <select id="randomMood">
                            <option value="all">全部随机</option>
                            <option value="happy">开心</option>
                            <option value="calm">平静</option>
                            <option value="satisfied">满足</option>
                            <option value="tired">疲惫</option>
                            <option value="anxious">焦虑</option>
                            <option value="confused">迷茫</option>
                            <option value="irritable">烦躁</option>
                            <option value="motivated">有干劲</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>身份分类</label>
                        <select id="randomIdentity">
                            <option value="all">全部随机</option>
                            <option value="female_middle_school">中学生（15-18，女性）</option>
                            <option value="female_college">大学生（18-23，女性）</option>
                            <option value="female_worker_junior">工作党（22-27，女性）</option>
                            <option value="female_worker_stable">工作党（28-35，女性）</option>
                            <option value="male_time_manager_student">男性时间管理型（学生）</option>
                            <option value="male_time_manager_worker">男性时间管理型（职场）</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>生成数量</label>
                        <select id="randomPoolSize">
                            <option value="50">50</option>
                            <option value="120" selected>120</option>
                            <option value="300">300</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>测试池 Seed</label>
                        <input id="randomSeed" type="text" placeholder="留空=按筛选自动生成">
                    </div>
                </div>
                <div class="pool-actions">
                    <button class="btn-add" onclick="generateRandomAnnotationPool()">生成测试池</button>
                    <button class="btn-soft" onclick="showPrevRandomAnnotation()">上一条</button>
                    <button class="btn-soft" onclick="loadRandomAnnotationTest()">下一条</button>
                    <button class="btn-soft" onclick="showRandomRandomAnnotation()">随机抽取</button>
                    <span class="pool-meta" id="randomPoolMeta">测试池未生成</span>
                </div>
            </div>
        </section>

        <div class="results-grid" id="resultsGrid"></div>

        <div class="history-backdrop" id="historyBackdrop" onclick="togglePromptHistory(false)"></div>
        <aside class="history-drawer" id="historyDrawer" aria-hidden="true">
            <div class="history-head">
                <h3>价格历史记录（提示词）</h3>
                <button class="btn-soft" style="padding:6px 10px" onclick="togglePromptHistory(false)">关闭</button>
            </div>
            <div class="history-body">
                <div class="history-block">
                    <div class="history-title" id="userHistoryTitle">用户提示词历史</div>
                    <ul class="history-list" id="userPromptHistoryList"></ul>
                    <div class="history-empty" id="userPromptHistoryEmpty">暂无记录</div>
                </div>
                <div class="history-block">
                    <div class="history-title" id="systemHistoryTitle">系统提示词历史</div>
                    <ul class="history-list" id="systemPromptHistoryList"></ul>
                    <div class="history-empty" id="systemPromptHistoryEmpty">暂无记录</div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const IS_LOCAL_HOST = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        const STORAGE_KEY = "openai_cards_v5";
        const LEGACY_STORAGE_KEY = "openai_cards_v4";
        const MODEL_CACHE_KEY = "provider_models_cache_v1";
        const MODEL_CACHE_TTL_MS = 1000 * 60 * 30;
        const PROVIDER_KEYS_STORAGE_KEY = "provider_keys_v1";
        const PROMPT_HISTORY_KEY = "price_prompt_history_v1";
        const RATING_STATE_KEY = "model_rating_state_v1";
        const MAX_STORED_RESPONSE_CHARS = 12000;

        const PROVIDER_META = {
            openai: {
                label: "OpenAI (GPT)",
                remoteOrigin: "https://api.openai.com",

        function normalizeRatingState(raw) {
            const safe = raw && typeof raw === "object" ? raw : {};
            return {
                sessionId: String(safe.sessionId || createRatingSessionId()),
                rounds: Array.isArray(safe.rounds)
                    ? safe.rounds.map((round, idx) => ({
                        id: String(round?.id || `r_${idx}_${Date.now().toString(36)}`),
                        ts: Number(round?.ts || Date.now()),

        function loadRatingState() {

        function saveRatingState() {

        function hasRatingRounds() {
            return Array.isArray(ratingState.rounds) && ratingState.rounds.length > 0;
        }

        function getCurrentRound() {
            if (!hasRatingRounds()) return null;
            return ratingState.rounds[ratingState.rounds.length - 1];
        }

        function startRatingRound(message) {
            const nextRound = {
                id: createCardId(),
                ts: Date.now(),
                message: String(message || ""),
                scores: {},
                comments: {},
                responses: {}
            };

            cards.forEach(card => {
                nextRound.scores[card.id] = "";
                nextRound.comments[card.id] = "";
                nextRound.responses[card.id] = "";
            });

            ratingState.rounds.push(nextRound);
            if (ratingState.rounds.length > 200) {
                ratingState.rounds = ratingState.rounds.slice(-200);
            }
            saveRatingState();
            refreshRatingPanels();
        }

        function resetRatingSession() {
            ratingState = defaultRatingState();
            saveRatingState();
            refreshRatingPanels();
        }

        function cardConfigFingerprint(card) {
            return JSON.stringify({
                provider: card.provider,
                apiUrl: card.apiUrl,
                model: card.model,
                temperature: Number(card.temperature ?? 0.7),
                topP: Number(card.topP ?? 1),
                topK: card.topK === "" ? "" : Number(card.topK),
                seed: card.seed === "" ? "" : Number(card.seed),
                maxTokens: Number(card.maxTokens ?? 2048),
                systemPrompt: String(card.systemPrompt || "")
            });
        }

        function shouldAskRatingSessionOnConfigChange(beforeCard, nextCard) {
            if (!beforeCard || !nextCard) return false;
            if (!hasRatingRounds()) return false;
            return cardConfigFingerprint(beforeCard) !== cardConfigFingerprint(nextCard);
        }

        function getCardScore(cardId, round) {
            if (!round || !round.scores) return "";
            const value = round.scores[cardId];
            if (value === "" || value === undefined || value === null) return "";
            const parsed = Number(value);
            return Number.isNaN(parsed) ? "" : parsed;
        }

        function getCardComment(cardId, round) {
            if (!round || !round.comments) return "";
            return String(round.comments[cardId] || "");
        }

        function getCardResponse(cardId, round) {
            if (!round || !round.responses) return "";
            return String(round.responses[cardId] || "");
        }

        function toStoredResponseText(text) {
            const normalized = String(text ?? "").trim();
            if (!normalized) return "";
            if (normalized.length <= MAX_STORED_RESPONSE_CHARS) return normalized;
            return `${normalized.slice(0, MAX_STORED_RESPONSE_CHARS)}\n\n[已截断，原文过长]`;
        }

        function updateCurrentRoundResponse(cardId, responseText) {
            const round = getCurrentRound();
            if (!round) return;
            if (!round.responses || typeof round.responses !== "object") {
                round.responses = {};
            }
            round.responses[cardId] = toStoredResponseText(responseText);
            saveRatingState();
        }

        function setCardScore(cardId, score) {
            const round = getCurrentRound();
            if (!round) {
                alert("请先发送一轮消息，再为各模型打分。");
                return;
            }

            const safeScore = Number(score);
            if (Number.isNaN(safeScore) || safeScore < 1 || safeScore > 5) return;
            round.scores[cardId] = safeScore;
            saveRatingState();
            refreshRatingPanels();
        }

        function setCardComment(cardId, value) {
            const round = getCurrentRound();
            if (!round) {
                alert("请先发送一轮消息，再填写评语。");
                return;
            }
            if (!round.comments || typeof round.comments !== "object") {
                round.comments = {};
            }
            round.comments[cardId] = String(value || "").trim();
            saveRatingState();
        }

        function getCardRatingStats(cardId) {
            const values = ratingState.rounds
                .map(round => Number(getCardScore(cardId, round)))
                .filter(value => !Number.isNaN(value) && value >= 1 && value <= 5);
            if (!values.length) return { count: 0, avg: "-" };
            const avg = (values.reduce((sum, val) => sum + val, 0) / values.length).toFixed(2);
            return { count: values.length, avg };
        }

        function createRatingButtons(cardId, activeScore) {
            return Array.from({ length: 5 }, (_, idx) => idx + 1)
                .map(score => `<button class="score-btn ${activeScore === score ? "active" : ""}" onclick="setCardScore('${cardId}', ${score})">${score}</button>`)
                .join("");
        }

        function renderRatingPanel(cardId) {
            const panel = document.getElementById(`rating-${cardId}`);
            if (!panel) return;

            const round = getCurrentRound();
            const stats = getCardRatingStats(cardId);
            const activeScore = Number(getCardScore(cardId, round));
            const comment = getCardComment(cardId, round);
            const hasResponse = Boolean(getCardResponse(cardId, round));
            const roundLabel = round ? `第 ${ratingState.rounds.length} 轮` : "尚未开始";
            const tip = round
                ? "本轮点击分数即可保存（1-5 分）"
                : "发送消息后，会自动开启新一轮打分";

            panel.innerHTML = `
                <div class="rating-head">
                    <div class="rating-title">打分面板 · ${roundLabel}</div>
                    <div class="rating-stats">累计 ${stats.count} 次 | 平均 ${stats.avg} | 原文${hasResponse ? "已保存" : "待返回"}</div>
                </div>
                <div class="rating-scores">${createRatingButtons(cardId, activeScore)}</div>
                <div class="field">
                    <label>评语（可选）</label>
                    <textarea id="rating-comment-${cardId}" placeholder="可写可不写，例如：这轮回答结构好，但不够简洁" onchange="setCardComment('${cardId}', this.value)">${escapeHtml(comment)}</textarea>
                </div>
                <div class="rating-tip">${tip}</div>
            `;
        }

        function refreshRatingPanels() {
            cards.forEach(card => renderRatingPanel(card.id));
        }

        function csvEscape(value) {
            const text = String(value ?? "");
            if (/[",\n]/.test(text)) {
                return `"${text.replace(/"/g, '""')}"`;
            }
            return text;
        }

        function formatExportDate(ts) {
            const date = new Date(ts || Date.now());
            const pad = num => String(num).padStart(2, "0");
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
        }

        function exportRatingsToExcel() {
            if (!hasRatingRounds()) {
                alert("暂无评分数据，请先发送消息并打分。\n");
                return;
            }

            const modelHeaders = cards.map((card, idx) => `模型${idx + 1}`);
            const rows = [];

            rows.push(["字段", ...modelHeaders]);
            rows.push(["名称", ...cards.map(card => card.name)]);
            rows.push(["供应商", ...cards.map(card => getProviderLabel(card.provider))]);
            rows.push(["模型", ...cards.map(card => card.model)]);
            rows.push(["温度", ...cards.map(card => card.temperature)]);
            rows.push(["Top P", ...cards.map(card => card.topP)]);
            rows.push(["Top K", ...cards.map(card => card.topK === "" ? "" : card.topK)]);
            rows.push(["Seed", ...cards.map(card => card.seed === "" ? "" : card.seed)]);
            rows.push(["Max Tokens", ...cards.map(card => card.maxTokens)]);
            rows.push(["系统 Prompt", ...cards.map(card => card.systemPrompt)]);
            rows.push([]);
            rows.push(["评分轮次", "发送时间", "消息", ...modelHeaders]);

            ratingState.rounds.forEach((round, idx) => {
                rows.push([
                    `第${idx + 1}轮`,
                    formatTime(round.ts),
                    round.message,
                    ...cards.map(card => {
                        const score = getCardScore(card.id, round);
                        return score === "" ? "" : score;
                    })
                ]);
            });

            rows.push([]);
            rows.push(["评分轮次", "模型", "模型名称", "发送时间", "用户消息", "模型返回原文", "分数", "评语"]);

            ratingState.rounds.forEach((round, idx) => {
                cards.forEach((card, cardIndex) => {
                    const score = getCardScore(card.id, round);
                    rows.push([
                        `第${idx + 1}轮`,
                        `模型${cardIndex + 1}`,
                        card.name,
                        formatTime(round.ts),
                        round.message,
                        getCardResponse(card.id, round),
                        score === "" ? "" : score,
                        getCardComment(card.id, round)
                    ]);
                });
            });

            const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `模型评分_${formatExportDate(Date.now())}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        function updateTopMeta() {
            document.getElementById("cardCount").textContent = `当前 ${cards.length} 个模型`;
            document.getElementById("sendBtn").textContent = cards.length > 0 ? `发送到全部 ${cards.length} 个模型` : "发送到全部模型";
        }

        function getModelsForProvider(provider) {
            const safeProvider = PROVIDER_META[provider] ? provider : "openai";
            const list = providerModels[safeProvider];
            return Array.isArray(list) && list.length ? list : FALLBACK_MODELS_BY_PROVIDER[safeProvider];
        }

        function createModelOptions(provider, selectedModel) {
            return getModelsForProvider(provider)
                .map(item => `<option value="${item.value}" ${item.value === selectedModel ? "selected" : ""}>${item.label}</option>`)
                .join("");
        }

        function buildLabelFromModelId(modelId) {
            const parts = String(modelId || "").split("/");
            return parts.length > 1 ? parts[1] : String(modelId || "");
        }

        function toModelOptionsFromApi(provider, responseData) {
            const list = Array.isArray(responseData?.data) ? responseData.data : [];
            const dynamic = list
                .map(item => String(item?.id || "").trim())
                .filter(Boolean)
                .map(id => ({ value: id, label: buildLabelFromModelId(id) }));

            const map = new Map();
            [...dynamic, ...getModelsForProvider(provider)].forEach(item => {
                if (!item || !item.value || item.value === "custom") return;
                if (!map.has(item.value)) map.set(item.value, item.label || item.value);
            });

            const merged = Array.from(map.entries())
                .map(([value, label]) => ({ value, label }))
                .sort((a, b) => a.label.localeCompare(b.label));

            merged.push({ value: "custom", label: "手动输入模型..." });
            return merged;
        }

        function setModelStatus(id, text) {
            const tip = document.getElementById(`model-status-${id}`);
            if (tip) tip.textContent = text || "";
        }

        function resolveApiUrl(url, provider) {
            const raw = String(url || "").trim();
            if (!raw) return raw;
            if (/^https?:\/\//i.test(raw)) return raw;
            if (raw.startsWith("/") && !IS_LOCAL_HOST) {
                const safeProvider = PROVIDER_META[provider] ? provider : "openai";
                return `${PROVIDER_META[safeProvider].remoteOrigin}${raw}`;
            }
            return raw;
        }

        function isOpenAIProvider(provider) {
            return provider !== "deepseek";
        }

        function loadModelCache() {
            const raw = localStorage.getItem(MODEL_CACHE_KEY);
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                if (!parsed.ts) return;
                if (Date.now() - Number(parsed.ts) > MODEL_CACHE_TTL_MS) return;
                if (Array.isArray(parsed.models)) {
                    providerModels.openai = parsed.models;
                    return;
                }
                if (parsed.modelsByProvider && typeof parsed.modelsByProvider === "object") {
                    if (Array.isArray(parsed.modelsByProvider.openai) && parsed.modelsByProvider.openai.length) {
                        providerModels.openai = parsed.modelsByProvider.openai;
                    }
                    if (Array.isArray(parsed.modelsByProvider.deepseek) && parsed.modelsByProvider.deepseek.length) {
                        providerModels.deepseek = parsed.modelsByProvider.deepseek;
                    }
                }
            } catch (err) {
                console.error("读取模型缓存失败:", err);
            }
        }

        function saveModelCache() {
            localStorage.setItem(MODEL_CACHE_KEY, JSON.stringify({
                ts: Date.now(),
                modelsByProvider: providerModels
            }));
        }

        function applyModelOptionsToCard(id, keepValue) {
            const select = document.getElementById(`model-select-${id}`);
            const customInput = document.getElementById(`model-custom-${id}`);
            const providerSelect = document.getElementById(`provider-${id}`);
            if (!select || !customInput || !providerSelect) return;

            const provider = providerSelect.value;

            const before = keepValue || getSelectedModel(id);
            const known = isKnownModel(provider, before);
            const selected = known ? before : "custom";

            select.innerHTML = createModelOptions(provider, selected);
            if (!known) {
                customInput.classList.remove("hidden");
                customInput.value = before;
            } else {
                customInput.classList.add("hidden");
            }
        }

        function applyModelOptionsToAllCards() {
            cards.forEach(card => applyModelOptionsToCard(card.id));
        }

        async function refreshModelListForCard(id, silent) {
            const config = collectCardConfig(id);
            const modelsUrl = resolveApiUrl(getProviderModelsUrl(config.provider), config.provider);
            const headers = { "Content-Type": "application/json" };
            const providerKey = config.apiKey || providerKeys[config.provider] || "";
            if (providerKey) headers.Authorization = `Bearer ${providerKey}`;

            setModelStatus(id, silent ? "" : "刷新模型中...");

            try {
                const response = await fetch(modelsUrl, { method: "GET", headers });
                if (!response.ok) {
                    throw new Error(`模型列表请求失败: HTTP ${response.status}`);
                }

                const data = await response.json();
                const models = toModelOptionsFromApi(config.provider, data);
                if (!models.length) {
                    throw new Error("模型列表为空");
                }

                providerModels[config.provider] = models;
                saveModelCache();
                applyModelOptionsToAllCards();
                setModelStatus(id, `已同步 ${models.length - 1} 个模型`);
                setTimeout(() => setModelStatus(id, ""), 2400);
            } catch (err) {
                console.error("刷新模型失败:", err);
                if (!silent) {
                    setModelStatus(id, `刷新失败: ${String(err.message || err)}`);
                }
            }
        }

        function isKnownModel(provider, model) {
            return getModelsForProvider(provider).some(item => item.value === model && item.value !== "custom");
        }

        function renderCards() {
            const grid = document.getElementById("resultsGrid");
            grid.innerHTML = "";
            cards.forEach(card => {
                grid.appendChild(createCardEl(card));
            });
            refreshRatingPanels();
            updateTopMeta();
        }

        function toggleConfig(id) {
            const form = document.getElementById(`config-${id}`);
            const toggle = document.getElementById(`toggle-${id}`);
            if (!form || !toggle) return;
            form.classList.toggle("collapsed");
            toggle.classList.toggle("collapsed");
        }

        function handleNameInput(id) {
            const nameInput = document.getElementById(`name-${id}`);
            const title = document.getElementById(`title-${id}`);
            if (!nameInput || !title) return;
            title.textContent = nameInput.value.trim() || "未命名模型";
        }

        function syncDisplayNameWithModel(id) {
            const nameInput = document.getElementById(`name-${id}`);
            const select = document.getElementById(`model-select-${id}`);
            const customInput = document.getElementById(`model-custom-${id}`);
            if (!nameInput || !select || !customInput) return;

            let nextName = "";
            if (select.value !== "custom") {
                const selectedOption = select.options[select.selectedIndex];
                nextName = (selectedOption?.textContent || buildLabelFromModelId(select.value)).trim();
            } else {
                nextName = buildLabelFromModelId(customInput.value.trim());
            }

            if (!nextName) return;
            nameInput.value = nextName;
            handleNameInput(id);
        }

        function handleModelChange(id) {
            const select = document.getElementById(`model-select-${id}`);
            const customInput = document.getElementById(`model-custom-${id}`);
            if (!select || !customInput) return;
            if (select.value === "custom") {
                customInput.classList.remove("hidden");
                customInput.focus();
            } else {
                customInput.classList.add("hidden");
                customInput.value = select.value;
            }

            syncDisplayNameWithModel(id);
        }

        function updateKeyIndicator(id, provider, keyValue) {
            const saved = document.getElementById(`saved-${id}`);
            if (!saved) return;
            saved.textContent = keyValue ? `💾 ${getProviderLabel(provider)} Key 已保存` : "";
        }

        function handleProviderChange(id) {
            const providerSelect = document.getElementById(`provider-${id}`);
            const urlInput = document.getElementById(`url-${id}`);
            const keyInput = document.getElementById(`key-${id}`);
            if (!providerSelect || !urlInput || !keyInput) return;

            const provider = PROVIDER_META[providerSelect.value] ? providerSelect.value : "openai";
            urlInput.value = getProviderChatUrl(provider);
            keyInput.value = providerKeys[provider] || "";
            updateKeyIndicator(id, provider, keyInput.value.trim());

            applyModelOptionsToCard(id);
            syncDisplayNameWithModel(id);
        }

        function handleCustomModelInput(id) {
            const select = document.getElementById(`model-select-${id}`);
            if (select) select.value = "custom";
            syncDisplayNameWithModel(id);
        }

        function toggleCustomModel(id) {
            const customInput = document.getElementById(`model-custom-${id}`);
            if (!customInput) return;
            customInput.classList.toggle("hidden");
            if (!customInput.classList.contains("hidden")) {
                customInput.focus();
                const select = document.getElementById(`model-select-${id}`);
                if (select) select.value = "custom";
            }
        }

        function getSelectedModel(id) {
            const select = document.getElementById(`model-select-${id}`);
            const customInput = document.getElementById(`model-custom-${id}`);
            if (!select || !customInput) return "";

            const customValue = customInput.value.trim();
            if (!customInput.classList.contains("hidden") && customValue) return customValue;
            if (select.value === "custom") return customValue;
            return select.value;
        }

        function collectCardConfig(id) {
            const topKRaw = document.getElementById(`topk-${id}`).value.trim();
            const seedRaw = document.getElementById(`seed-${id}`).value.trim();
            const provider = document.getElementById(`provider-${id}`).value || "openai";
            return {
                id,
                name: document.getElementById(`name-${id}`).value.trim() || "未命名模型",
                provider,
                apiUrl: document.getElementById(`url-${id}`).value.trim() || getProviderChatUrl(provider),
                apiKey: document.getElementById(`key-${id}`).value.trim(),
                model: getSelectedModel(id),
                temperature: Number(document.getElementById(`temp-${id}`).value || 0.7),
                topP: Number(document.getElementById(`topp-${id}`).value || 1),
                topK: topKRaw ? Number(topKRaw) : "",
                seed: seedRaw ? Number(seedRaw) : "",
                maxTokens: Number(document.getElementById(`maxtokens-${id}`).value || 2048),
                systemPrompt: document.getElementById(`system-${id}`).value.trim()
            };
        }

        function saveCard(id) {
            syncDisplayNameWithModel(id);
            const config = collectCardConfig(id);
            if (!config.model) {
                alert("请先选择模型，或在手动模型里输入模型名。");
                return;
            }

            const beforeCard = cards.find(item => item.id === id);
            if (shouldAskRatingSessionOnConfigChange(beforeCard, config)) {
                const keep = confirm(
                    "检测到你修改了模型配置。\n\n点击【确定】：延续当前评分，继续接着打分。\n点击【取消】：清空旧评分，重新开始新一轮。"
                );
                if (!keep) {
                    resetRatingSession();
                }
            }

            providerKeys[config.provider] = config.apiKey || "";
            saveProviderKeys();

            cards = cards.map(item => item.id === id ? normalizeCard(config) : item);
            saveCards();

            const tip = document.getElementById(`save-status-${id}`);
            if (tip) {
                tip.textContent = "已保存";
                setTimeout(() => {
                    tip.textContent = "";
                }, 2000);
            }

            const saved = document.getElementById(`saved-${id}`);
            if (saved) {
                saved.textContent = config.apiKey ? `💾 ${getProviderLabel(config.provider)} Key 已保存` : "";
            }

            handleNameInput(id);
            updateTopMeta();
        }

        function addModelCard() {
            const base = normalizeCard(defaultCardTemplate());
            base.name = `新模型 ${cards.length + 1}`;
            cards.push(base);
            saveCards();
            renderCards();
        }

        function duplicateModelCard(id) {
            const source = collectCardConfig(id);
            const cloneName = source.name ? `${source.name} 副本` : `新模型 ${cards.length + 1}`;
            const cloned = normalizeCard({
                ...source,
                id: createCardId(),
                name: cloneName
            });

            cards.push(cloned);
            saveCards();
            renderCards();
        }

        function removeModelCard(id) {
            if (cards.length <= 1) return;
            cards = cards.filter(item => item.id !== id);
            saveCards();
            renderCards();
        }

        async function sendToAll() {
            const message = document.getElementById("userMessage").value.trim();
            if (!message) {
                alert("请先输入消息。");
                return;
            }

            const btn = document.getElementById("sendBtn");
            btn.disabled = true;
            btn.textContent = "发送中...";

            cards = cards.map(item => {
                const config = normalizeCard(collectCardConfig(item.id));
                providerKeys[config.provider] = config.apiKey || "";
                return config;
            });
            saveProviderKeys();
            saveCards();

            trackPromptHistory(message, cards);
            renderPromptHistory();
            startRatingRound(message);

            await Promise.all(cards.map(card => sendToModel(card.id, message)));
            updateTopMeta();
            btn.disabled = false;
        }

        async function sendToModel(id, message) {
            const config = collectCardConfig(id);
            const effectiveApiKey = config.apiKey || providerKeys[config.provider] || "";
            const resultDiv = document.getElementById(`result-${id}`);
            const statusSpan = document.getElementById(`status-${id}`);

            if (!effectiveApiKey) {
                resultDiv.innerHTML = "<div class=\"result-content error\">⚠️ 未配置 API Key，请先在配置里填写后再发送。</div>";
                statusSpan.className = "card-status error";
                statusSpan.textContent = "未配置";
                updateCurrentRoundResponse(id, "[未发送] 未配置 API Key");
                return;
            }

            if (!config.model) {
                resultDiv.innerHTML = "<div class=\"result-content error\">⚠️ 未配置模型，请先选择或手动填写模型名。</div>";
                statusSpan.className = "card-status error";
                statusSpan.textContent = "未配置";
                updateCurrentRoundResponse(id, "[未发送] 未配置模型");
                return;
            }

            resultDiv.innerHTML = "<div class=\"loading-spinner\"><div class=\"spinner\"></div></div>";
            statusSpan.className = "card-status loading";
            statusSpan.textContent = "请求中";

            const requestBody = {
                model: config.model,
                messages: [
                    { role: "system", content: config.systemPrompt || "You are a helpful assistant." },
                    { role: "user", content: message }
                ],
                temperature: config.temperature,
                top_p: config.topP,
                stream: false
            };

            if (isOpenAIProvider(config.provider)) {
                requestBody.max_completion_tokens = config.maxTokens;
            } else {
                requestBody.max_tokens = config.maxTokens;
            }

            if (!isOpenAIProvider(config.provider) && config.topK !== "" && !Number.isNaN(Number(config.topK))) {
                requestBody.top_k = Number(config.topK);
            }
            if (!isOpenAIProvider(config.provider) && config.seed !== "" && !Number.isNaN(Number(config.seed))) {
                requestBody.seed = Number(config.seed);
            }

            try {
                const startedAt = Date.now();
                const requestUrl = resolveApiUrl(config.apiUrl || getProviderChatUrl(config.provider), config.provider);
                const response = await fetch(requestUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${effectiveApiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });

                const duration = ((Date.now() - startedAt) / 1000).toFixed(2);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const content =
                    data.choices?.[0]?.message?.content ||
                    data.choices?.[0]?.text ||
                    data.content ||
                    data.response ||
                    data.result ||
                    JSON.stringify(data, null, 2);

                const usage = data.usage?.total_tokens ? ` | 🔤 ${data.usage.total_tokens} tokens` : "";
                resultDiv.innerHTML = `
                    <div class="result-meta">⏱️ ${duration}s | 📊 ${String(content).length} 字符${usage}</div>
                    <div class="result-content">${escapeHtml(String(content))}</div>
                `;
                updateCurrentRoundResponse(id, String(content));

                statusSpan.className = "card-status ready";
                statusSpan.textContent = "完成";
            } catch (error) {
                let troubleshooting = "";
                const messageText = String(error.message || "请求失败");

                if (messageText.includes("404")) {
                    troubleshooting = "可能是模型名错误或该模型当前不可用。";
                } else if (messageText.includes("401")) {
                    troubleshooting = "API Key 无效，请重新检查。";
                } else if (messageText.includes("Failed to fetch") || messageText.includes("NetworkError")) {
                    troubleshooting = "网络连接或代理设置可能有问题。";
                }

                resultDiv.innerHTML = `
                    <div class="result-content error">❌ ${escapeHtml(messageText)}${troubleshooting ? `<br><br>💡 ${escapeHtml(troubleshooting)}` : ""}</div>
                    <details class="error-details">
                        <summary>查看请求详情（调试用）</summary>
                        <pre><strong>Provider:</strong> ${escapeHtml(getProviderLabel(config.provider))}
<strong>URL:</strong> ${escapeHtml(resolveApiUrl(config.apiUrl || getProviderChatUrl(config.provider), config.provider))}
<strong>Model:</strong> ${escapeHtml(config.model)}
<strong>Request:</strong>
${escapeHtml(JSON.stringify(requestBody, null, 2))}</pre>
                    </details>
                `;
                updateCurrentRoundResponse(id, `ERROR: ${messageText}${troubleshooting ? ` | ${troubleshooting}` : ""}`);

                statusSpan.className = "card-status error";
                statusSpan.textContent = "错误";
            }
        }

        function clearAll() {
            document.getElementById("userMessage").value = "";
            cards.forEach(card => {
                const resultDiv = document.getElementById(`result-${card.id}`);
                const status = document.getElementById(`status-${card.id}`);
                if (resultDiv) resultDiv.innerHTML = resultPlaceholder();
                if (status) {
                    status.className = "card-status ready";
                    status.textContent = "就绪";
                }
            });
        }

        function clearAllStorage() {
            const ok = confirm("确定清除所有本地保存的配置和 API Key 吗？");
            if (!ok) return;

            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(LEGACY_STORAGE_KEY);
            localStorage.removeItem(MODEL_CACHE_KEY);
            localStorage.removeItem(PROVIDER_KEYS_STORAGE_KEY);
            localStorage.removeItem(PROMPT_HISTORY_KEY);
            localStorage.removeItem(RATING_STATE_KEY);
            for (let i = 1; i <= 6; i += 1) {
                localStorage.removeItem(`chutes_config_${i}`);
                localStorage.removeItem(`chutes_api_key_${i}`);
            }

            providerKeys = { openai: "", deepseek: "" };
            promptHistory.user = [];
            promptHistory.system = [];
            promptHistory.comboHashes = [];
            ratingState = defaultRatingState();
            cards = DEFAULT_CARDS.map(item => normalizeCard(item));
            renderCards();
            renderPromptHistory();
            alert("已清除，恢复为默认 6 个模型卡片。");
        }

        function formatTime(ts) {
            return new Date(Number(ts || Date.now())).toLocaleString("zh-CN", { hour12: false });
        }

        function pushUniquePrompt(historyList, text) {
            const normalized = String(text || "").trim();
            if (!normalized) return;
            if (historyList.some(item => item.text === normalized)) return;
            historyList.unshift({ text: normalized, ts: Date.now() });
            if (historyList.length > 120) historyList.length = 120;
        }

        function renderHistoryList(listElId, emptyElId, records) {
            const listEl = document.getElementById(listElId);
            const emptyEl = document.getElementById(emptyElId);
            if (!listEl || !emptyEl) return;

            listEl.innerHTML = records
                .map(item => `<li class="history-item"><span class="history-time">${escapeHtml(formatTime(item.ts))}</span>${escapeHtml(item.text)}</li>`)
                .join("");

            const hasData = records.length > 0;
            emptyEl.style.display = hasData ? "none" : "block";
            listEl.style.display = hasData ? "block" : "none";
        }

        function renderPromptHistory() {
            renderHistoryList("userPromptHistoryList", "userPromptHistoryEmpty", promptHistory.user);
            renderHistoryList("systemPromptHistoryList", "systemPromptHistoryEmpty", promptHistory.system);
            const userTitle = document.getElementById("userHistoryTitle");
            const systemTitle = document.getElementById("systemHistoryTitle");
            if (userTitle) userTitle.textContent = `用户提示词历史（${promptHistory.user.length}）`;
            if (systemTitle) systemTitle.textContent = `系统提示词历史（${promptHistory.system.length}）`;
        }

        function togglePromptHistory(show) {
            const drawer = document.getElementById("historyDrawer");
            const backdrop = document.getElementById("historyBackdrop");
            if (!drawer || !backdrop) return;

            const shouldShow = typeof show === "boolean" ? show : !drawer.classList.contains("show");
            drawer.classList.toggle("show", shouldShow);
            backdrop.classList.toggle("show", shouldShow);
            drawer.setAttribute("aria-hidden", shouldShow ? "false" : "true");
            if (shouldShow) renderPromptHistory();
        }

        function trackPromptHistory(userMessage, cardConfigs) {
            const userText = String(userMessage || "").trim();
            const systemTexts = Array.from(new Set((cardConfigs || [])
                .map(item => String(item.systemPrompt || "").trim())
                .filter(Boolean)
                .sort((a, b) => a.localeCompare(b))));

            const comboPayload = JSON.stringify({ userText, systemTexts });
            const comboHash = String(hashString(comboPayload));
            if (promptHistory.comboHashes.includes(comboHash)) {
                return;
            }

            promptHistory.comboHashes.unshift(comboHash);
            if (promptHistory.comboHashes.length > 400) promptHistory.comboHashes.length = 400;
            pushUniquePrompt(promptHistory.user, userText);
            systemTexts.forEach(text => pushUniquePrompt(promptHistory.system, text));
            savePromptHistory();
        }

        function hashString(input) {
            let hash = 2166136261;
            const text = String(input || "");
            for (let i = 0; i < text.length; i += 1) {
                hash ^= text.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return hash >>> 0;
        }

        function createSeededRandom(seedText) {
            let seed = hashString(seedText || "annotation-seed") || 1;
            return function nextRandom() {
                seed += 0x6d2b79f5;
                let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
                t ^= t + Math.imul(t ^ (t >>> 7), 61 | t);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function randomIntFrom(rng, min, max) {
            return Math.floor(rng() * (max - min + 1)) + min;
        }

        function randomPickFrom(rng, list) {
            if (!Array.isArray(list) || list.length === 0) return "";
            return list[randomIntFrom(rng, 0, list.length - 1)];
        }

        function weightedPick(rng, weightedMap) {
            const entries = Object.entries(weightedMap || {}).filter(([, weight]) => Number(weight) > 0);
            if (!entries.length) return "mood_recorded";
            const total = entries.reduce((sum, [, weight]) => sum + Number(weight), 0);
            let point = rng() * total;
            for (let i = 0; i < entries.length; i += 1) {
                point -= Number(entries[i][1]);
                if (point <= 0) return entries[i][0];
            }
            return entries[entries.length - 1][0];
        }

        function pickIdentityKey(inputKey, rng) {
            if (inputKey && inputKey !== "all" && IDENTITY_PROFILES[inputKey]) return inputKey;
            const keys = Object.keys(IDENTITY_PROFILES);
            return randomPickFrom(rng, keys);
        }

        function pickMoodKey(inputKey, rng) {
            if (inputKey && inputKey !== "all" && MOOD_PROFILES[inputKey]) return inputKey;
            const keys = Object.keys(MOOD_PROFILES).filter(item => item !== "all");
            return randomPickFrom(rng, keys);
        }

        function normalizeHour(hour) {
            if (hour <= 23) return hour;
            return hour - 24;
        }

        function buildPoolSeed(filters) {
            const customSeed = String(filters.seed || "").trim();
            if (customSeed) return customSeed;
            return `pool-v2|mood:${filters.mood}|identity:${filters.identity}|size:${filters.size}`;
        }

        function pickCurrentHour(profile, rng) {
            const minHour = Number(profile?.currentHourRange?.[0] ?? 18);
            const maxHour = Number(profile?.currentHourRange?.[1] ?? 22);
            return normalizeHour(randomIntFrom(rng, minHour, maxHour));
        }

        function pickActivityType(rng, identityKey) {
            const isStudent = identityKey.includes("student") || identityKey.includes("school") || identityKey.includes("college");
            const weights = isStudent
                ? { study: 5, life: 3, entertainment: 2, meeting: 1, work: 1 }
                : { work: 5, meeting: 3, life: 3, entertainment: 2, study: 1 };
            return weightedPick(rng, weights);
        }

        function pickMoodLabel(rng, moodProfile, isLatest) {
            const fallback = BASE_MOOD_LABELS;
            if (isLatest) return randomPickFrom(rng, moodProfile.labels || fallback);
            const mixed = [...fallback, "专注", "平静", "满足", "有干劲", "疲惫"];
            return randomPickFrom(rng, mixed);
        }

        function buildMoodMessage(rng, moodProfile, identityKey, isLatest) {
            const baseText = randomPickFrom(rng, moodProfile.moodTexts || ["今天状态正常"]);
            if (!isLatest) {
                const generic = ["上午效率一般", "中午有些分心", "下午逐渐进入状态", "晚上准备收尾" ];
                return randomPickFrom(rng, generic);
            }

            if (identityKey.includes("worker")) {
                const workerPrefix = ["下班前", "开完会后", "处理完关键事项后", "收尾阶段"]; 
                return `${randomPickFrom(rng, workerPrefix)}${baseText}`;
            }

            const studentPrefix = ["自习后", "课后", "晚间学习时", "复习阶段"]; 
            return `${randomPickFrom(rng, studentPrefix)}${baseText}`;
        }

        function buildRandomActivities(rng, identityKey, moodProfile, currentTimestamp) {
            const profile = IDENTITY_PROFILES[identityKey] || IDENTITY_PROFILES.female_worker_junior;
            const activityCount = randomIntFrom(rng, 3, 8);
            const activities = [];
            let cursor = currentTimestamp - randomIntFrom(rng, 15, 50) * 60 * 1000;

            for (let i = 0; i < activityCount; i += 1) {
                const isLatest = i === 0;
                const activityType = pickActivityType(rng, identityKey);
                const contents = profile.activityMap[activityType] || profile.activityMap.life || ["日常安排"];
                const content = randomPickFrom(rng, contents);
                const duration = activityType === "meeting" ? randomIntFrom(rng, 30, 90) : randomIntFrom(rng, 20, 120);
                const completed = isLatest ? rng() > 0.45 : rng() > 0.18;

                activities.push({
                    content,
                    duration,
                    activityType: RANDOM_ACTIVITY_TYPES.includes(activityType) ? activityType : "life",
                    moodLabel: pickMoodLabel(rng, moodProfile, isLatest),
                    timestamp: cursor,
                    completed
                });

                cursor -= (duration + randomIntFrom(rng, 10, 85)) * 60 * 1000;
            }

            return activities.reverse();
        }

        function buildRandomEventData(eventType, latestMoodMessage, activities, rng, poolSeed, index) {
            const latestActivity = activities[activities.length - 1] || { content: "整理任务", duration: 30 };

            if (eventType === "mood_recorded") {
                return {
                    messageId: `msg_mood_${hashString(`${poolSeed}-${index}`)}`,
                    mood: latestMoodMessage
                };
            }

            if (eventType === "activity_recorded") {
                return {
                    messageId: `msg_activity_${hashString(`${poolSeed}-${index}`)}`,
                    content: latestActivity.content,
                    activityType: latestActivity.activityType || "work",
                    duration: Number(latestActivity.duration || randomIntFrom(rng, 20, 120))
                };
            }

            if (eventType === "task_deleted") {
                return {
                    content: latestActivity.content
                };
            }

            return {
                content: latestActivity.content
            };
        }

        function buildRandomAnnotationPayload(params) {
            const { rng, mood, identity, poolSeed, index } = params;
            const moodKey = pickMoodKey(mood, rng);
            const identityKey = pickIdentityKey(identity, rng);
            const moodProfile = MOOD_PROFILES[moodKey] || MOOD_PROFILES.all;
            const identityProfile = IDENTITY_PROFILES[identityKey] || IDENTITY_PROFILES.female_worker_junior;
            const currentHour = pickCurrentHour(identityProfile, rng);
            const dayOffset = hashString(`${poolSeed}-${index}`) % 120;
            const minute = randomIntFrom(rng, 0, 59);
            const dayStartTimestamp = Date.UTC(2026, 0, 1) + dayOffset * 24 * 60 * 60 * 1000;
            const currentTimestamp = dayStartTimestamp + currentHour * 60 * 60 * 1000 + minute * 60 * 1000;

            const todayActivitiesList = buildRandomActivities(rng, identityKey, moodProfile, currentTimestamp);
            const todayDuration = todayActivitiesList.reduce((sum, item) => sum + Number(item.duration || 0), 0);
            const recentMoodCount = randomIntFrom(rng, 1, 3);
            const recentMoodMessages = Array.from({ length: recentMoodCount }, (_, idx) => {
                const isLatest = idx === recentMoodCount - 1;
                return buildMoodMessage(rng, moodProfile, identityKey, isLatest);
            });
            const latestMoodMessage = recentMoodMessages[recentMoodMessages.length - 1] || buildMoodMessage(rng, moodProfile, identityKey, true);
            const eventType = weightedPick(rng, moodProfile.eventWeights || MOOD_PROFILES.all.eventWeights);

            return {
                eventType,
                eventData: buildRandomEventData(eventType, latestMoodMessage, todayActivitiesList, rng, poolSeed, index),
                userContext: {
                    todayActivities: todayActivitiesList.length,
                    todayDuration,
                    currentHour,
                    recentMoodMessages,
                    recentAnnotations: [],
                    todayActivitiesList
                },
                lang: "zh"
            };
        }

        function buildRandomAnnotationPool(size, filters) {
            const safeSize = Math.max(1, Number(size) || 1);
            const poolSeed = buildPoolSeed(filters);
            const rng = createSeededRandom(poolSeed);
            return {
                poolSeed,
                items: Array.from({ length: safeSize }, (_, index) =>
                    buildRandomAnnotationPayload({
                        rng,
                        mood: filters.mood,
                        identity: filters.identity,
                        poolSeed,
                        index
                    })
                )
            };
        }

        function loadAnnotationTemplate() {
            document.getElementById("userMessage").value = JSON.stringify(ANNOTATION_TEMPLATE, null, 2);
        }

        function readRandomFilters() {
            const mood = document.getElementById("randomMood")?.value || "all";
            const identity = document.getElementById("randomIdentity")?.value || "all";
            const size = Number(document.getElementById("randomPoolSize")?.value || 120);
            const seed = document.getElementById("randomSeed")?.value || "";
            return { mood, identity, size, seed };
        }

        function updateRandomPoolMeta() {
            const meta = document.getElementById("randomPoolMeta");
            if (!meta) return;
            if (!annotationRandomPool.length) {
                meta.textContent = "测试池未生成";
                return;
            }
            meta.textContent = `池 ${annotationPoolCursor + 1}/${annotationRandomPool.length} | Seed ${activePoolSeed}`;
        }

        function showRandomAnnotationByIndex(index) {
            if (!annotationRandomPool.length) return;
            const safeIndex = ((index % annotationRandomPool.length) + annotationRandomPool.length) % annotationRandomPool.length;
            annotationPoolCursor = safeIndex;
            document.getElementById("userMessage").value = JSON.stringify(annotationRandomPool[safeIndex], null, 2);
            updateRandomPoolMeta();
        }

        function generateRandomAnnotationPool() {
            const filters = readRandomFilters();
            const result = buildRandomAnnotationPool(filters.size, filters);
            annotationRandomPool = result.items;
            activePoolSeed = result.poolSeed;
            annotationPoolCursor = 0;
            showRandomAnnotationByIndex(0);
        }

        function loadRandomAnnotationTest() {
            if (!annotationRandomPool.length) {
                generateRandomAnnotationPool();
                return;
            }
            showRandomAnnotationByIndex(annotationPoolCursor + 1);
        }

        function showPrevRandomAnnotation() {
            if (!annotationRandomPool.length) {
                generateRandomAnnotationPool();
                return;
            }
            showRandomAnnotationByIndex(annotationPoolCursor - 1);
        }

        function showRandomRandomAnnotation() {
            if (!annotationRandomPool.length) {
                generateRandomAnnotationPool();
                return;
            }
            const rng = createSeededRandom(`${activePoolSeed}-jump-${annotationPoolCursor}`);
            const randomIndex = randomIntFrom(rng, 0, annotationRandomPool.length - 1);
            showRandomAnnotationByIndex(randomIndex);
        }

        function init() {
            loadProviderKeys();
            loadModelCache();
            loadPromptHistory();
            loadRatingState();
            cards = loadCards();
            if (!cards.length) {
                const migrated = migrateLegacyConfigs();
                cards = migrated.length ? migrated.map(normalizeCard) : [];
            }
            if (!cards.length) cards = DEFAULT_CARDS.map(item => normalizeCard(item));
            hydrateProviderKeysFromCards();
            renderCards();
            renderPromptHistory();
            generateRandomAnnotationPool();

            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") togglePromptHistory(false);
            });

            const seeded = cards.find(item => providerKeys[item.provider]);
            if (seeded) {
                refreshModelListForCard(seeded.id, true);
            }
        }

        init();
    </script>
