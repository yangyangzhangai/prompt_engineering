<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test - Chutes API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            min-height: 100px;
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            color: #388e3c;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Chutes API CORS Test</h1>
    <p>Testing cross-origin requests from localhost:8080 to llm.chutes.ai</p>
    
    <button onclick="testCORS()">Test API Request</button>
    <button onclick="clearOutput()">Clear</button>
    
    <div id="output"></div>

    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toISOString();
            const prefix = type === 'error' ? '❌ ERROR' : type === 'success' ? '✅ SUCCESS' : 'ℹ️ INFO';
            output.innerHTML += `[${timestamp}] ${prefix}: ${message}\n\n`;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
        }

        async function testCORS() {
            clearOutput();
            log('Starting CORS test...');
            log('Origin: ' + window.location.origin);
            
            const url = 'https://llm.chutes.ai/v1/chat/completions';
            const apiKey = 'test-api-key'; // Using a test key to see the CORS behavior
            
            log('Target URL: ' + url);
            
            // Test 1: Using X-API-Key header
            log('\n--- Test 1: Using X-API-Key header ---');
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({
                        model: 'meta-llama/Llama-3.1-8B-Instruct',
                        messages: [
                            { role: 'user', content: 'Hello' }
                        ],
                        max_tokens: 10
                    })
                });
                
                log('Response received!', 'success');
                log('Status: ' + response.status);
                
            } catch (error) {
                log('Error with X-API-Key: ' + error.message, 'error');
            }
            
            // Test 2: Using Authorization Bearer header
            log('\n--- Test 2: Using Authorization Bearer header ---');
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: 'meta-llama/Llama-3.1-8B-Instruct',
                        messages: [
                            { role: 'user', content: 'Hello' }
                        ],
                        max_tokens: 10
                    })
                });
                
                log('Response received!', 'success');
                log('Status: ' + response.status);
                
            } catch (error) {
                log('Error with Authorization: ' + error.message, 'error');
            }
            
            // Test 3: Simple GET request to test basic CORS
            log('\n--- Test 3: Simple GET request to api.chutes.ai ---');
            try {
                const response = await fetch('https://api.chutes.ai/ping', {
                    method: 'GET'
                });
                
                log('GET Response received!', 'success');
                log('Status: ' + response.status);
                
            } catch (error) {
                log('Error with GET: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
